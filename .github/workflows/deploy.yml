name: Deploy Deck to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build deck
        working-directory: presentation
        run: uv run build.py

      - name: Stage deploy artifacts
        run: |
          mkdir -p _site/images
          # Rewrite image paths for flat _site/ layout
          sed 's|src="../../images/|src="images/|g' \
            presentation/output/deck.html > _site/deck.html
          cp _site/deck.html _site/index.html
          # Copy only images referenced in the built deck
          grep -o 'src="images/[^"]*"' _site/deck.html \
            | sed 's/src="images\///;s/"//' \
            | sort -u \
            | while read f; do
                [ -f "presentation/images/$f" ] && cp "presentation/images/$f" "_site/images/$f"
              done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
